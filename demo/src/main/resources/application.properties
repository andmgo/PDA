spring.application.name=demo

# Configuración de archivos estáticos
spring.web.resources.static-locations=classpath:/static/

# Configuración de Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# CONFIGURACIÓN DE BASE DE DATOS MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/gescazone
spring.data.mongodb.auto-index-creation=true

# CONFIGURACIÓN GENERAL
spring.jackson.time-zone=America/Bogota
spring.jackson.serialization.write-dates-as-timestamps=false

# TIEMPO DE VIDA DE LA SESIÓN (30 minutos)
server.servlet.session.timeout=30m

# Cookie de sesión
server.servlet.session.cookie.name=GESCAZONE-SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.max-age=1800
server.servlet.session.cookie.same-site=strict

# JWT
jwt.secret=gescazone-super-secreto-2024-conjunto-residencial-clave-larga
jwt.expiration=86400000